name: Android APK Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-24.04

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Build APK
    uses: ArtemSBulgakov/buildozer-action@v1
    with:
      command: buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: opataz-apk
      path: bin/*.apk
